<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USA Softball Bat Checker</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border-color: #000000;
            --focus-color: #0055ff;
            --banned-bg: #ff0000;
            --banned-text: #ffffff;
            --approved-bg: #00aa00;
            --approved-text: #ffffff;
            --warning-bg: #ffcc00;
            --warning-text: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 16px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 24px;
            text-align: center;
            text-transform: uppercase;
        }

        .search-container {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        input[type="text"] {
            flex-grow: 1;
            font-size: 1.5rem;
            padding: 16px;
            border: 4px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            font-weight: bold;
        }

        input[type="text"]:focus {
            border-color: var(--focus-color);
        }

        .camera-btn {
            background-color: #e0e0e0;
            border: 4px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
        }

        .camera-btn svg {
            width: 32px;
            height: 32px;
        }

        #results {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .empty-state {
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 40px 20px;
            border: 4px dashed var(--border-color);
            border-radius: 12px;
        }

        .card {
            border: 6px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            font-size: 1.5rem;
        }

        .card-banned {
            background-color: var(--banned-bg);
            color: var(--banned-text);
            border-color: #000;
        }

        .card-banned h2 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .card-approved {
            background-color: var(--approved-bg);
            color: var(--approved-text);
            border-color: #000;
        }

        .card-approved h2 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .card-warning {
            background-color: var(--warning-bg);
            color: var(--warning-text);
            border-color: #000;
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
        }

        .detail {
            margin-bottom: 8px;
            font-weight: bold;
        }

        .label {
            font-weight: normal;
            font-size: 1.2rem;
            opacity: 0.9;
            display: block;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h1>Bat Checker</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Enter Model or Brand" autocomplete="off" autocorrect="off">
        <button class="camera-btn" disabled aria-label="Scan with Camera (Coming Soon)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
        </button>
    </div>

    <div id="results">
        <div class="empty-state">
            Start typing to search.<br><br>
            Please check the bat's handle or barrel for the model number.
        </div>
    </div>

    <script>
        let batsData = [];
        let searchIndex = new Map();

        async function loadBats() {
            try {
                // Use cache busting query parameter to force fetching fresh data
                const response = await fetch(`bats.json?v=${new Date().getTime()}`);
                if (response.ok) {
                    batsData = await response.json();
                    buildIndex();
                } else {
                    console.error('Failed to load bats.json');
                }
            } catch (error) {
                console.error('Error fetching bats data:', error);
            }
        }

        function buildIndex() {
            searchIndex.clear();
            batsData.forEach(bat => {
                // Pre-compute lowercased search string to avoid doing it during filtering
                bat._searchString = `${bat.model || ''} ${bat.manufacturer || ''} ${bat.name || ''}`.toLowerCase();
                
                // Tokenize by spaces and hyphens to build prefix index
                const words = bat._searchString.split(/[\s-]+/);
                const indexedPrefixes = new Set();
                
                words.forEach(word => {
                    // Index by 1-character prefix
                    if (word.length >= 1) {
                        const prefix1 = word.substring(0, 1);
                        if (!indexedPrefixes.has(prefix1)) {
                            if (!searchIndex.has(prefix1)) searchIndex.set(prefix1, []);
                            searchIndex.get(prefix1).push(bat);
                            indexedPrefixes.add(prefix1);
                        }
                    }
                    // Index by 2-character prefix
                    if (word.length >= 2) {
                        const prefix2 = word.substring(0, 2);
                        if (!indexedPrefixes.has(prefix2)) {
                            if (!searchIndex.has(prefix2)) searchIndex.set(prefix2, []);
                            searchIndex.get(prefix2).push(bat);
                            indexedPrefixes.add(prefix2);
                        }
                    }
                    // Index by 3-character prefix for even better lookup
                    if (word.length >= 3) {
                        const prefix3 = word.substring(0, 3);
                        if (!indexedPrefixes.has(prefix3)) {
                            if (!searchIndex.has(prefix3)) searchIndex.set(prefix3, []);
                            searchIndex.get(prefix3).push(bat);
                            indexedPrefixes.add(prefix3);
                        }
                    }
                });
            });
        }

        function renderResults(query) {
            const resultsContainer = document.getElementById('results');
            resultsContainer.innerHTML = '';

            if (!query) {
                resultsContainer.innerHTML = `
                    <div class="empty-state">
                        Start typing to search.<br><br>
                        Please check the bat's handle or barrel for the model number.
                    </div>
                `;
                return;
            }

            const lowerQuery = query.toLowerCase();
            const firstWord = lowerQuery.split(/\s+/)[0];
            
            // Leverage the index map for near-instantaneous filtering
            let candidateBats = batsData;
            if (firstWord.length >= 3 && searchIndex.has(firstWord.substring(0, 3))) {
                candidateBats = searchIndex.get(firstWord.substring(0, 3));
            } else if (firstWord.length === 2 && searchIndex.has(firstWord)) {
                candidateBats = searchIndex.get(firstWord);
            } else if (firstWord.length === 1 && searchIndex.has(firstWord)) {
                candidateBats = searchIndex.get(firstWord);
            }

            // Filter down the reduced candidate set
            const matches = candidateBats.filter(bat => bat._searchString.includes(lowerQuery));

            if (matches.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="card card-warning">
                        NOT FOUND IN REGISTRY<br><br>
                        Please check for physical USA Softball certification stamps on the bat.
                    </div>
                `;
                return;
            }

            // Limit rendering to 50 items to ensure the main UI thread never blocks
            const matchesToRender = matches.slice(0, 50);

            matchesToRender.forEach(bat => {
                const status = (bat.status || '').toUpperCase();
                const isBanned = status === 'BANNED';
                const isApproved = status === 'APPROVED';
                
                let cardClass = 'card';
                let title = '';
                
                if (isBanned) {
                    cardClass += ' card-banned';
                    title = '<h2>BANNED / ILLEGAL</h2>';
                } else if (isApproved) {
                    cardClass += ' card-approved';
                    title = '<h2>APPROVED FOR USE</h2>';
                } else {
                    title = `<h2>${status}</h2>`;
                }

                const cardHtml = `
                    <div class="${cardClass}">
                        ${title}
                        <div class="detail"><span class="label">Manufacturer</span>${bat.manufacturer || 'N/A'}</div>
                        <div class="detail"><span class="label">Model</span>${bat.model || 'N/A'}</div>
                        <div class="detail"><span class="label">Name</span>${bat.name || 'N/A'}</div>
                    </div>
                `;
                resultsContainer.innerHTML += cardHtml;
            });
            
            if (matches.length > 50) {
                resultsContainer.innerHTML += `
                    <div class="empty-state" style="font-size: 1.2rem; padding: 20px;">
                        Showing top 50 matches. Keep typing to refine your search...
                    </div>
                `;
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderResults(e.target.value.trim());
        });

        // Initialize
        loadBats();
    </script>
</body>

</html>
